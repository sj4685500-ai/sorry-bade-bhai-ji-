<script>

function show(id){

.forEach(p=>p.classList.remove('active'));

document
.getElementById(id)
.classList.add('active');
}

function page3(){

setTimeout(()=>{
show('page3');
},800);
}

function page4(){
blast();

setTimeout(()=>{
show('page4');
},800);
}

function page5(){

blast();

show('page5');

setInterval(()=>{

confetti({
particleCount:20,
spread:70,
origin:{
x:Math.random(),
y:Math.random()-0.2
}
});

},500);

}

function move(btn){

const x=Math.random()*
(window.innerWidth-120);

const y=Math.random()*
(window.innerHeight-70);

btn.style.left=x+'px';
btn.style.top=y+'px';
}

['noBtn1','noBtn2','noBtn3']
.forEach(id=>{

const btn=document
.getElementById(id);

btn.addEventListener(
'touchstart',
function(e){
e.preventDefault();
move(btn);
}
);

btn.addEventListener(
'mouseover',
function(){
move(btn);
}
);

});

for(let i=0;i<20;i++){

let bubble=
document.createElement('div');

bubble.className='bubble';

let size=
Math.random()*60+20;

bubble.style.width=
size+'px';

bubble.style.height=
size+'px';

bubble.style.left=
Math.random()*100+'%';

bubble.style.animationDuration=
(Math.random()*8+8)+'s';

bubble.style.animationDelay=
Math.random()*5+'s';

document
.getElementById('bubbles')
.appendChild(bubble);

}

</script>
